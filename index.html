<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmogoat - The Cosmic Goat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #1a0033, #4a1d6e, #0a0a2e); }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Hero -->
  <section class="hero min-h-screen flex items-center">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <img src="https://ibb.co/0jPnN3bJ" alt="Cosmogoat Logo" class="mx-auto w-96 mb-8 rounded-3xl">
      <h1 class="text-7xl font-bold mb-6">Cosmogoat</h1>
      <p class="text-2xl max-w-2xl mx-auto">La chèvre qui a pris les étoiles.</p>
    </div>
  </section>

  <!-- Galerie -->
  <section class="py-20 bg-zinc-950">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">La Conquête Cosmique</h2>
      <div class="grid md:grid-cols-2 gap-8">
        <img src="https://ibb.co/W45Bj4wX" class="rounded-3xl" alt="Cosmogoat">
        <img src="https://ibb.co/JwpRTCjh" class="rounded-3xl" alt="Cosmogoat">
        <img src="https://ibb.co/21JzQhDk" class="rounded-3xl" alt="Cosmogoat">
        <img src="https://ibb.co/3ytLw8Pt" class="rounded-3xl" alt="Cosmogoat">
      </div>
    </div>
  </section>

  <footer class="py-12 text-center border-t border-zinc-800">
    <p class="text-xl">$COSMOGOAT — Conquering the cosmos, one hoof at a time.</p>
  </footer>
</body>
</html>
