<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmogoat - The Cosmic Goat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- Hero -->
  <div class="min-h-screen bg-gradient-to-br from-purple-950 via-indigo-950 to-black flex items-center justify-center">
    <div class="text-center px-6">
      <img src="https://ibb.co/0jPnN3bJ" alt="Cosmogoat" class="mx-auto w-80 md:w-96 mb-8 rounded-3xl">
      <h1 class="text-6xl md:text-7xl font-bold mb-4">Cosmogoat</h1>
      <p class="text-2xl text-cyan-300">La chèvre qui a pris les étoiles.</p>
    </div>
  </div>

  <!-- Galerie -->
  <div class="py-20 bg-zinc-950">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12 text-white">La Conquête Cosmique</h2>
      <div class="grid md:grid-cols-2 gap-6">
        <img src="https://ibb.co/W45Bj4wX" class="rounded-3xl w-full" alt="Cosmogoat">
        <img src="https://ibb.co/JwpRTCjh" class="rounded-3xl w-full" alt="Cosmogoat">
        <img src="https://ibb.co/21JzQhDk" class="rounded-3xl w-full" alt="Cosmogoat">
        <img src="https://ibb.co/3ytLw8Pt" class="rounded-3xl w-full" alt="Cosmogoat">
      </div>
    </div>
  </div>

  <footer class="py-12 text-center">
    <p class="text-xl">$COSMOGOAT — Conquering the cosmos, one hoof at a time.</p>
  </footer>
</body>
</html>
