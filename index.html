<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COSMOGOAT - The Cosmic Goat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .hero { background: linear-gradient(180deg, #05060a, #1a0033); }
  </style>
</head>
<body class="bg-[#05060a] text-white">

  <!-- Hero -->
  <section class="hero min-h-screen flex items-center justify-center text-center px-6">
    <div>
      <img src="https://i.ibb.co/MDwB5YqL/6o-B8a-1.jpg" alt="COSMOGOAT" class="mx-auto w-80 md:w-96 mb-10 rounded-3xl shadow-2xl">
      <h1 class="text-6xl md:text-7xl font-bold tracking-tighter mb-4">COSMOGOAT</h1>
      <p class="text-2xl md:text-3xl text-cyan-400">The legendary goat that took the stars.</p>
      <p class="mt-4 text-lg max-w-md mx-auto">From meme to cosmic empire.</p>
    </div>
  </section>

  <!-- Tokenomics -->
  <section class="py-24 border-t border-zinc-800">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-16">TOKENOMICS</h2>
      <div class="grid md:grid-cols-4 gap-6">
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
          <div class="text-5xl font-bold">1,000,000,000</div>
          <p class="mt-4 text-sm text-gray-400">Total Supply</p>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
          <div class="text-5xl font-bold text-cyan-400">3%</div>
          <p class="mt-4 text-sm text-gray-400">Buy / Sell Tax</p>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
          <div class="text-5xl font-bold text-green-400">80%</div>
          <p class="mt-4 text-sm text-gray-400">RWA SPCXB Dividends</p>
        </div>
        <div class="bg-zinc-900 p-8 rounded-3xl text-center">
          <div class="text-5xl font-bold text-amber-400">20%</div>
          <p class="mt-4 text-sm text-gray-400">Liquidity + Burn</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Visuals -->
  <section class="py-24 bg-zinc-950">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-16">THE CONQUEST</h2>
      <div class="space-y-16">
        <img src="https://i.ibb.co/9kPxLgFr/IMx-Xf.jpg" class="rounded-3xl w-full" alt="First Contact">
        <img src="https://i.ibb.co/9k490GHM/a-BTZx.jpg" class="rounded-3xl w-full" alt="Goat Colony">
        <img src="https://ibb.co/BHJ14r9z" class="rounded-3xl w-full" alt="COSMOGOAT Headquarters">
      </div>
    </div>
  </section>

  <footer class="py-16 text-center">
    <p class="text-3xl font-bold">$COSMOGOAT</p>
    <p class="mt-4 text-gray-400">Conquering the cosmos, one hoof at a time.</p>
  </footer>
</body>
</html>
